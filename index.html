<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitter Selection Mission 2026</title>
    <style>
        :root { --current: #2ecc71; --upcoming: #f1c40f; --apprentice: #9b59b6; --pyq: #3498db; --ai: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; max-width: 1400px; margin: auto; }
        .column { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #ccc; margin-bottom: 20px; }
        .col-current { border-top-color: var(--current); }
        .col-upcoming { border-top-color: var(--upcoming); }
        .col-apprentice { border-top-color: var(--apprentice); }
        .col-pyq { border-top-color: var(--pyq); }
        .col-ai { border-top-color: var(--ai); }
        h2 { text-align: center; font-size: 1.1rem; color: #333; margin-top: 0; }
        .card { background: #fafafa; border: 1px solid #eee; padding: 12px; margin-bottom: 10px; border-radius: 8px; position: relative; }
        .btn { display: block; text-align: center; padding: 8px; margin-top: 10px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; font-size: 13px; border: none; width: 100%; cursor: pointer; }
        .ans { display: none; color: #155724; background: #d4edda; padding: 8px; border-radius: 4px; margin-top: 10px; font-size: 13px; border-left: 3px solid #28a745; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 10px; color: white; font-weight: bold; }
    </style>
</head>
<body>

<h1 style="text-align:center; color:#2c3e50;">Fitter Selection Portal 2026</h1>

<div class="dashboard">
    <div class="column col-current"><h2>✅ Permanent Jobs</h2><div id="current-list"></div></div>
    <div class="column col-upcoming"><h2>⏳ Upcoming</h2><div id="upcoming-list"></div></div>
    <div class="column col-apprentice"><h2>🎓 Apprentice</h2><div id="apprentice-list"></div></div>
</div>

<h2 style="text-align:center; margin-top:30px; color:#2c3e50;">🎯 डेली तैयारी ज़ोन</h2>
<div class="dashboard">
    <div class="column col-pyq">
        <h2>📚 All India PYQ (रैंडम)</h2>
        <div id="pyq-display">लोड हो रहा है...</div>
    </div>
    <div class="column col-ai">
        <h2>🔥 आज का AI चैलेंज</h2>
        <div id="daily-ai-set">लोड हो रहा है...</div>
    </div>
</div>

<script>
    // 1. वैकेंसी लोड करना
    fetch('jobs.json').then(res => res.json()).then(data => {
        const divs = { current: document.getElementById('current-list'), upcoming: document.getElementById('upcoming-list'), apprentice: document.getElementById('apprentice-list') };
        data.forEach((job, index) => {
            const title = job.title.toLowerCase();
            const card = `<div class="card"><b>${job.title}</b><br><small>${job.company}</small><a href="details.html?id=${index}" class="btn">विवरण देखें</a></div>`;
            if (title.includes('apprentice')) divs.apprentice.innerHTML += card;
            else if (title.includes('upcoming') || title.includes('soon')) divs.upcoming.innerHTML += card;
            else divs.current.innerHTML += card;
        });
    });

    // 2. स्टडी डेटा लोड करना (PYQ और Daily Sets)
    fetch('questions.json').then(res => res.json()).then(data => {
        // PYQ रैंडम दिखाना
        const randomPYQ = data.pyq[Math.floor(Math.random() * data.pyq.length)];
        document.getElementById('pyq-display').innerHTML = `
            <div class="card">
                <span class="tag" style="background:#3498db;">🏛️ ${randomPYQ.dept}</span>
                <span style="font-size:10px; color:gray; float:right;">📅 ${randomPYQ.date}</span>
                <p style="margin-top:15px;"><b>Q: ${randomPYQ.q}</b></p>
                <div id="p-ans" class="ans">उत्तर: ${randomPYQ.a}</div>
                <button class="btn" onclick="document.getElementById('p-ans').style.display='block'">उत्तर देखें</button>
            </div>`;

        // आज का डेली सेट दिखाना
        const todayStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
        const dailySet = data.ai_daily_sets.find(s => s.set_date === todayStr) || data.ai_daily_sets[data.ai_daily_sets.length - 1];
        
        let aiHTML = `<p style="text-align:center; font-size:12px; color:#e67e22;"><b>तारीख: ${dailySet.set_date}</b></p>`;
        dailySet.questions.forEach((q, i) => {
            aiHTML += `
                <div class="card">
                    <p><b>Q${i+1}: ${q.q}</b></p>
                    <div id="ai-ans-${i}" class="ans">${q.a}</div>
                    <button class="btn" style="background:#e67e22;" onclick="document.getElementById('ai-ans-${i}').style.display='block'">Check Ans</button>
                </div>`;
        });
        document.getElementById('daily-ai-set').innerHTML = aiHTML;
    });
</script>
</body>
</html>
