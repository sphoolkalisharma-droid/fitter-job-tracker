<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitter Govt Jobs Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .job-card { border-bottom: 1px solid #ddd; padding: 15px 0; }
        .job-title { font-size: 18px; font-weight: bold; color: #007bff; }
        .job-info { font-size: 14px; color: #555; margin-top: 5px; }
        .apply-btn { display: inline-block; margin-top: 10px; padding: 8px 15px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fitter Permanent Jobs Tracker</h1>
        <div id="job-list">पूरी पंचायत (वैकेंसी) लोड हो रही है...</div>
    </div>

    <script>
        fetch('jobs.json')
            .then(response => response.json())
            .then(data => {
                const jobList = document.getElementById('job-list');
                jobList.innerHTML = ''; 
                if (data.length === 0) {
                    jobList.innerHTML = 'आज कोई नई वैकेंसी नहीं मिली।';
                    return;
                }
                data.forEach(job => {
                    const card = `
                        <div class="job-card">
                            <div class="job-title">${job.title}</div>
                            <div class="job-info">कंपनी: ${job.company} | जगह: ${job.location}</div>
                            <a href="${job.link}" target="_blank" class="apply-btn">पूरी जानकारी देखें</a>
                        </div>
                    `;
                    jobList.innerHTML += card;
                });
            })
            .catch(err => {
                document.getElementById('job-list').innerHTML = 'डेटा लोड करने में दिक्कत आ रही है।';
                console.error(err);
            });
    </script>
</body>
</html>
