name: Master_Job_Scanner

on:
  workflow_dispatch:  # इससे 'Run workflow' बटन आएगा

jobs:
  update_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Python Setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install feedparser
        run: pip install feedparser requests

      - name: Run Scraper
        run: python update_jobs.py  # यह तुम्हारी पाइथन फाइल को चलाएगा

      - name: Save Jobs
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add jobs.json
          git commit -m "Unlimited Jobs Added" || exit 0
          git push
          
