name: Master_Job_Scanner

on:
  workflow_dispatch:  # इससे तुम्हें 'Run workflow' वाला नीला बटन मिलेगा
  schedule:
    - cron: '0 0 * * *' # यह रोज रात को अपने आप भी अपडेट करेगा

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install feedparser requests

      - name: Run Scraper
        run: python update_jobs.py  # यह तुम्हारी मेन फाइल को चलाएगा

      - name: Save and Push Updates
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add jobs.json
          git commit -m "Unlimited Jobs Updated: $(date)" || exit 0
          git push
