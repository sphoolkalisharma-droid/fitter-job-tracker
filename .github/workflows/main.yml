name: Global Job Auto Update

on:
  schedule:
    - cron: '0 0 * * *' # हर रात 12 बजे अपने आप चलेगा
  workflow_dispatch:      # जब मन करे बटन दबाकर अपडेट करें

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Tools
        run: pip install feedparser

      - name: Run Master Scraper
        run: python update_jobs.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add jobs.json
          git commit -m "Auto-updated vacancies" || exit 0
          git push
